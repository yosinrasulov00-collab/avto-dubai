services:
  - type: web
    name: avto-dubai-khori-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npx prisma generate && npm run build && npx prisma db push && npm run db:seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://avto-dubai-site.onrender.com

  - type: web
    name: avto-dubai-site
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://avto-dubai-khori-api.onrender.com/api
      - key: NEXT_PUBLIC_SITE_URL
        value: https://avto-dubai-site.onrender.com
      - key: BACKEND_URL
        value: https://avto-dubai-khori-api.onrender.com
