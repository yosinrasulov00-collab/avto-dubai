services:
  - type: web
    name: avto-dubai-khori-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && DATABASE_URL="${DATABASE_URL:-postgresql://build:build@localhost:5432/build}" npx prisma generate
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://avtodubaikhori.com

  - type: web
    name: avto-dubai-site
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://avto-dubai-khori-api.onrender.com/api
      - key: NEXT_PUBLIC_SITE_URL
        value: https://avtodubaikhori.com
      - key: BACKEND_URL
        value: https://avto-dubai-khori-api.onrender.com
